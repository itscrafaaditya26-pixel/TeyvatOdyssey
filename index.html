<!DOCTYPE html>
<html>
<head>
    <title>testing</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            margin:0;
            font-family:sans-serif;
            background:#f4f4f4;
        }

        /* ================= NAVBAR ================= */

        nav{
            background:#2f2f35;
            padding:15px 10px;
        }

        .nav-container{
            display:flex;
            justify-content:center;
            gap:10px;

            /* tetap menyamping */
            flex-wrap:nowrap;
        }

        .nav-container a{

            background:#444;
            color:white;

            text-decoration:none;
            font-weight:bold;

            padding:12px 14px;

            border-radius:10px;

            border:2px solid #666;

            font-size:4vw;

            transition:0.3s;
        }

        .nav-container a:hover{
            background:#666;
        }

        /* halaman aktif */
        .nav-container .active{
            background:white;
            color:black;
            border:2px solid black;
        }

        /* ================= HERO ================= */

        .hero{

            text-align:center;

            padding:60px 20px;

            min-height:100vh;
        }

        .hero-logo{

            width:100%;
            max-width:650px;

            height:auto;

            margin-bottom:40px;
        }

        .hero h1{

            font-size:11vw;

            margin-bottom:20px;
        }

        .hero p{

            font-size:5vw;

            font-weight:bold;

            margin:15px 0;
        }

        /* ================= FOOTER ================= */

        footer{

            text-align:center;

            padding:20px;

            background:white;

            border-top:1px solid #ddd;

            color:#666;

            font-size:4vw;
        }

        /* ================= LAPTOP ================= */

        @media (min-width:768px){

            .nav-container a{
                font-size:20px;
                padding:14px 22px;
            }

            .hero h1{
                font-size:60px;
            }

            .hero p{
                font-size:28px;
            }

            footer{
                font-size:16px;
            }

        }

    </style>

</head>
<body>

    <!-- NAVBAR -->

    <nav>

        <div class="nav-container">

            <a href="index.html" class="active">Home</a>

            <a href="profil.html">Profil</a>

            <a href="about.html">About Me</a>

            <a href="galeri.html">Galeri</a>

        </div>

    </nav>

    <!-- HERO -->

    <div class="hero">

        <img src="miHoYo.jpg" alt="miHoYo Logo" class="hero-logo">

        <h1>いらっしゃいませ</h1>

        <p>Ra isa maca</p>

        <p>Halaman utama tempat nongkrong.</p>

    </div>

    <!-- FOOTER -->

    <footer>

        &copy; Copyright by Rafa Aditya 2026

    </footer>

</body>
</html>
