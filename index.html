<!DOCTYPE html>
<html>
<head>
    <title>testing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f4f4f4;
        }

        /* ================= NAVBAR ================= */
        nav {
            background: #2f2f35;
            padding: 10px 15px; 
            position: relative;
            z-index: 10; /* Agar menu tidak tertumpuk oleh gambar/tulisan di bawahnya */
        }

        /* Ikon Titik Tiga */
        .menu-icon {
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: inline-block;
            user-select: none;
        }

        /* Container menu disembunyikan secara default */
        .nav-container {
            display: none; 
            flex-direction: column; /* Susun tombol dari atas ke bawah */
            gap: 10px; 
            
            /* Membuat dropdown melayang ke bawah */
            position: absolute;
            top: 100%; 
            left: 0;
            width: 100%;
            background: #2f2f35;
            padding: 15px 0;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
        }

        /* Class ini akan diaktifkan oleh JavaScript saat ikon ditekan */
        .nav-container.show {
            display: flex;
        }

        .nav-container a {
            background: #444;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 15px; 
            border-radius: 10px;
            border: 2px solid #666;
            font-size: 18px; 
            margin: 0 20px; /* Jarak aman di sisi kiri dan kanan HP */
            transition: 0.3s;
            text-align: center;
        }

        .nav-container a:hover {
            background: #666;
        }

        .nav-container .active {
            background: white;
            color: black;
            border: 2px solid black;
        }

        /* ================= HERO ================= */
        .hero {
            text-align: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .hero-logo {
            width: 100%;
            max-width: 650px;
            height: auto;
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 11vw;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 5vw;
            font-weight: bold;
            margin: 15px 0;
        }

        /* ================= FOOTER ================= */
        footer {
            text-align: center;
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 4vw;
        }

        /* ================= LAPTOP VIEW ================= */
        /* Jika dibuka di Laptop, menunya akan otomatis menyamping lagi */
        @media (min-width: 768px) {
            .menu-icon { display: none; } /* Sembunyikan titik 3 */

            .nav-container {
                display: flex;
                flex-direction: row;
                position: static; 
                justify-content: center;
                background: transparent;
                padding: 5px 0;
                box-shadow: none;
                gap: 15px;
            }

            .nav-container a { margin: 0; padding: 14px 22px; }
            .hero h1 { font-size: 60px; }
            .hero p { font-size: 28px; }
            footer { font-size: 16px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">&#8942;</div>

        <div class="nav-container" id="navMenu">
            <a href="index.html" class="active">Home</a>
            <a href="profil.html">Profil</a>
            <a href="about.html">About Me</a>
            <a href="galeri.html">Galeri</a>
        </div>
    </nav>

    <div class="hero">
        <img src="miHoYo.jpg" alt="miHoYo Logo" class="hero-logo">
        <h1>いらっしゃいませ</h1>
        <p>Ra isa maca</p>
        <p>Halaman utama tempat nongkrong.</p>
    </div>

    <footer>
        &copy; Copyright by Rafa Aditya 2026
    </footer>

    <script>
        function toggleMenu() {
            var menu = document.getElementById("navMenu");
            menu.classList.toggle("show");
        }
    </script>

</body>
</html>
